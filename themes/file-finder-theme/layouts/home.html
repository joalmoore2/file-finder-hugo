{{ define "main" }}
<div class="file-finder-wrap">
  <h1>File Finder</h1>
  <p class="intro">
    Use the search field and the "File Type" filter to locate files by title or
    type.
  </p>

  <div class="search-controls">
    <div class="search-field">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="keyword-search"
        placeholder="Find a file by keyword(s)..."
      />
    </div>

    <div class="search-field">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="phrase-search"
        placeholder="Find a file by exact phrase..."
      />
    </div>

    <label>Filter by file type:</label>
    <select id="type-filter">
      <option value="">- Any -</option>
      {{ range .Site.Data.documenttypes.docs }}
      <option value="{{ .name }}">{{ .name }}</option>
      {{ end }}
    </select>

    <label>Sort by:</label>
    <select id="sort-order">
      <option value="asc">Document Title Asc</option>
      <option value="desc">Document Title Desc</option>
    </select>

    <div class="search-buttons">
      <button id="search-btn">Search</button>
      <button id="reset-btn">Reset</button>
    </div>
  </div>

  <div id="results-grid"></div>
</div>
{{ end }}
